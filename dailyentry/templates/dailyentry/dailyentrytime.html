<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ customer.first_name }} - Service Unavailable</title>
    <!-- Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #E6F7F3;
            --card-bg: #FFFFFF;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --primary-color: #00F0B5;
            --warning-color: #F59E0B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .mobile-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            width: 100%;
        }

        .icon {
            width: 70px;
            height: 70px;
            background-color: #FEF3C7;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .icon svg {
            width: 32px;
            height: 32px;
            fill: var(--warning-color);
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .hours {
            background-color: #F9FAFB;
            border: 1px dashed #D1D5DB;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 15px;
        }

        @media (min-width: 480px) {
            .mobile-container {
                border-radius: 25px;
                min-height: 500px;
            }
        }
    </style>
</head>

<body>

    <div class="mobile-container">
        <div class="card">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
                </svg>
            </div>
            <h2>Portal Closed</h2>
            <p>Dear <b>{{ customer.first_name }} {{ customer.last_name }}</b>, the daily entry portal is currently
                closed. We only accept entries
                during business hours.</p>

            <div class="hours">
                Allowed Hours:<br>
                <span style="color: var(--primary-dark);">9:00 AM - 6:00 PM</span>
            </div>
        </div>
    </div>

</body>

</html>
