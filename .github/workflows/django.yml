name: Django DRF API CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  ENVIRONMENT: ci

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    # ==================== CODE QUALITY CHECKS ====================
    - name: Code formatting check (Black)
      run: |
        echo "🎨 Checking code formatting with Black..."
        black --check --diff .
        
    - name: Import sorting check (isort)
      run: |
        echo "📦 Checking import sorting with isort..."
        isort --check-only --diff .
        
    - name: Linting (flake8)
      run: |
        echo "🔍 Running flake8 linting..."
        echo "Checking for critical errors only..."
        flake8 . --count --show-source --statistics
        echo "✅ Flake8 check completed"
        
    - name: Security scan (bandit)
      run: |
        echo "🔒 Running security scan with bandit..."
        # Check if bandit is properly installed
        if command -v bandit &> /dev/null; then
          echo "✅ Bandit installed successfully"
          # Run bandit scan - will fail CI if issues found
          # Skip tests that have been manually reviewed and documented:
          # B105: hardcoded passwords (test/config files)
          # B106: hardcoded password function args (test fixtures)
          # B104: binding to all interfaces (Docker test config)
          # B108: temp directory usage (Docker test config)
          # B608: SQL injection (validated with regex patterns)
          bandit -r . \
            --exclude ./*/tests.py,./*/tests/*,./*/migrations/*,./venv/*,./.venv/*,./staticfiles/*,./static/* \
            --skip B104,B105,B106,B108,B608 \
            -f json -o bandit-report.json
          bandit -r . \
            --exclude ./*/tests.py,./*/tests/*,./*/migrations/*,./venv/*,./.venv/*,./staticfiles/*,./static/* \
            --skip B104,B105,B106,B108,B608 \
            -f txt
          echo "✅ Code security scan completed - no issues found"
        else
          echo "❌ Bandit not available"
          exit 1
        fi
    
    - name: Install jq
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl tar

    - name: 📥 Download OSV-Scanner
      run: |
        echo "✅ Downloading OSV-Scanner binary..."
        curl -L -o osv-scanner https://github.com/google/osv-scanner/releases/download/v2.2.3/osv-scanner_linux_amd64
        sudo mv osv-scanner /usr/local/bin/
        sudo chmod +x /usr/local/bin/osv-scanner
        osv-scanner --version

    - name: 🚨 Scan Python dependencies for vulnerabilities
      run: |
        echo "📦 Scanning dependencies in requirements.txt..."
        set +e  # prevent immediate exit on vuln detection
        osv-scanner --lockfile=requirements.txt --output=json > osv-report.json
        VULN_COUNT=$(jq '.vulns | length' osv-report.json)
        echo "Found $VULN_COUNT vulnerabilities."
        if [ "$VULN_COUNT" -gt 0 ]; then
          echo "❌ Vulnerabilities detected! Details:"
          jq '.' osv-report.json
          exit 1
        else
          echo "✅ No known vulnerabilities detected."
        fi
        
    # ==================== DJANGO FRAMEWORK CHECKS ====================
    - name: Django system check
      run: |
        echo "🔧 Running Django system checks..."
        python manage.py check
        
    - name: Django security check
      run: |
        echo "🛡️ Running Django security checks..."
        python manage.py check --deploy
        
    - name: Check for missing migrations
      run: |
        echo "📋 Checking for missing migrations..."
        python manage.py makemigrations --dry-run --check
        
    - name: Django migrate
      run: |
        echo "🗄️ Running Django migrations..."
        python manage.py migrate
        
    - name: Collect static files
      run: |
        echo "📁 Collecting static files..."
        python manage.py collectstatic --noinput
        
    # ==================== TESTING ====================
    - name: Run Django tests with coverage
      run: |
        echo "🧪 Running Django tests with coverage..."
        coverage run --source='.' manage.py test
        coverage report
        coverage xml
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    # ==================== API & DOCUMENTATION CHECKS ====================
    - name: Validate API schema (OpenAPI/Swagger)
      run: |
        echo "📖 Validating API schema with drf-yasg..."
        python -c "
        import os
        os.environ.setdefault('ENVIRONMENT', 'ci')
        os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'banas.settings')
        import django
        django.setup()
        from drf_yasg.generators import OpenAPISchemaGenerator
        from drf_yasg import openapi
        try:
            generator = OpenAPISchemaGenerator(
                info=openapi.Info(
                    title='Banas API',
                    default_version='v1',
                    description='API Documentation'
                )
            )
            schema = generator.get_schema()
            print('✅ API schema generated successfully')
            print(f'✅ Found {len(schema.paths)} API endpoints')
        except Exception as e:
            print(f'❌ API schema generation failed: {e}')
            raise
        "
        
    - name: Basic Django import verification
      run: |
        echo "🐍 Verifying Django can import all models..."
        python -c "
        import os
        import django
        os.environ.setdefault('ENVIRONMENT', 'ci')
        os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'banas.settings')
        django.setup()
        
        # Import all models from each app
        from django.apps import apps
        print('✅ Django setup successful')
        
        for app in apps.get_app_configs():
            try:
                models_module = app.models_module
                if models_module:
                    print(f'✅ Models imported successfully from {app.name}')
            except Exception as e:
                print(f'⚠️ Warning importing models from {app.name}: {e}')
                
        print('🎉 All Django imports successful!')
        "
        
  # ==================== DOCKER CHECKS ====================
  docker:
    name: Docker Build & Security
    runs-on: ubuntu-latest
    needs: [test]  # Only run if tests pass
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
          
    # ==================== DOCKER BUILD TESTS ====================
    - name: Test Docker build
      run: |
        echo "🛠️ Testing Docker build process..."
        docker build --target builder -t banas-api:builder .
        docker build -t banas-api:latest .
        echo "✅ Docker build successful"
        
    - name: Inspect Docker image
      run: |
        echo "🔍 Inspecting Docker image..."
        docker images banas-api:latest
        # Check image size
        IMAGE_SIZE=$(docker images banas-api:latest --format "{{.Size}}")
        echo "📏 Image size: $IMAGE_SIZE"
        
    - name: Test Docker container startup
      run: |
        echo "🚀 Testing Docker container startup..."
        
        # Create a minimal test env file matching the new settings style
        cat > test.env << EOF
        ENVIRONMENT=ci
        SECRET_KEY=test-secret-key-for-docker-testing-only-not-real
        DEBUG=False
        DJANGO_SETTINGS_MODULE=banas.settings
        NEW_RELIC_ENVIRONMENT=ci
        NEW_RELIC_LICENSE_KEY=fake-license-key-for-ci-testing
        SUPABASE_ACCESS_KEY_ID=fake-key
        SUPABASE_SECRET_ACCESS_KEY=fake-secret
        SUPABASE_STORAGE_BUCKET_NAME=test-bucket
        SUPABASE_S3_REGION_NAME=ap-south-1
        SUPABASE_S3_ENDPOINT_URL=https://fake.supabase.co/storage/v1/s3
        BASE_URL=http://localhost:8000
        EVOLUTION_BASE_URL=http://fake-evolution-api
        EVOLUTION_INSTANCE_NAME=test
        EVOLUTION_API_KEY=fake-key
        QSTASH_TOKEN=fake-qstash-token
        EOF
        
        # Override CMD so it runs gunicorn directly without newrelic-admin
        docker run -d --name banas-test \
          --env-file test.env \
          -p 8000:8000 \
          --entrypoint gunicorn \
          banas-api:latest \
          banas.wsgi:application --bind 0.0.0.0:8000 --workers=2
          
        # Wait for container to be ready
        echo "⏳ Waiting for container to start..."
        sleep 15
        
        # Check if container is running
        if docker ps | grep -q banas-test; then
          echo "✅ Container started successfully"
          docker logs banas-test --tail 30
        else
          echo "❌ Container failed to start"
          docker logs banas-test
          exit 1
        fi
        
    - name: Run container health checks
      run: |
        echo "🩺 Running container health checks..."
        
        # Simple curl-based health check — no fragile docker exec needed
        for i in {1..10}; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ || true)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ] || [ "$STATUS" = "403" ]; then
            echo "✅ HTTP server is responding (status: $STATUS)"
            break
          fi
          echo "⏳ Attempt $i: Server not ready (status: $STATUS), retrying..."
          sleep 3
        done
        
        # Verify admin is available
        ADMIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/admin/ || true)
        if [ "$ADMIN_STATUS" = "200" ] || [ "$ADMIN_STATUS" = "302" ]; then
          echo "✅ Django admin is accessible (status: $ADMIN_STATUS)"
        else
          echo "⚠️ Django admin returned status: $ADMIN_STATUS (may be expected without DB)"
        fi
        
        echo "✅ Container health checks complete"
    
    - name: Run Trivy security scan (table format)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'banas-api:latest'
        format: 'table'
        exit-code: '0'
        
    - name: Test container logs
      run: |
        echo "📜 Checking container logs..."
        docker logs banas-test --tail 50
        
    - name: Cleanup test containers
      if: always()
      run: |
        echo "🧽 Cleaning up test containers..."
        docker stop banas-test || true
        docker rm banas-test || true
        docker rmi banas-api:builder || true
        docker rmi banas-api:latest || true   
        
  # ==================== DOCKER COMPOSE VALIDATION ====================
  docker-compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Create test environment file
      run: |
        echo "📝 Creating test environment file..."
        cat > .env << EOF
        ENVIRONMENT=ci
        SECRET_KEY=test-secret-key-for-compose-testing
        DEBUG=False
        DB_NAME=test
        DB_USER=test
        DB_PASSWORD=test
        DB_HOST=db
        DB_PORT=5432
        MEMCACHED_URL=memcached:11211
        AWS_ACCESS_KEY_ID=test
        AWS_SECRET_ACCESS_KEY=test
        AWS_STORAGE_BUCKET_NAME=test
        AWS_S3_REGION_NAME=us-east-1
        EOF
        echo "✅ Test environment file created"
      
    - name: Validate docker-compose.yml
      run: |
        echo "📄 Validating docker-compose.yml..."
        docker compose config --quiet
        echo "✅ docker-compose.yml is valid"
        
    - name: Test docker-compose build
      run: |
        echo "🛠️ Testing docker-compose build..."
        
        # Test build only (don't start services)
        docker compose build --no-cache
        echo "✅ docker-compose build successful"
        
    - name: Validate compose file structure
      run: |
        echo "🔍 Validating compose file structure..."
        
        # Check for required sections
        if ! grep -q "services:" docker-compose.yml; then
          echo "❌ Missing services section"
          exit 1
        fi
        
        if ! grep -q "volumes:" docker-compose.yml; then
          echo "⚠️ No volumes section found"
        fi
        
        # Check for security best practices
        if grep -q "privileged: true" docker-compose.yml; then
          echo "⚠️ Warning: privileged mode detected"
        fi
        
        if ! grep -q "restart:" docker-compose.yml; then
          echo "⚠️ Warning: No restart policy defined"
        fi
        
        echo "✅ Compose file structure validation passed"
        
  # ==================== BUILD SUMMARY ====================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, docker, docker-compose]
    if: always()
    
    steps:
    - name: CI Results Summary
      run: |
        echo "## 🚀 CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check Category | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|---------------|---------|" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Django Framework | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Tests & Coverage | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| API Validation | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker Build | ${{ needs.docker.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker Security | ${{ needs.docker.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker Compose | ${{ needs.docker-compose.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Overall status
        ALL_PASSED="true"
        if [ "${{ needs.test.result }}" != "success" ]; then ALL_PASSED="false"; fi
        if [ "${{ needs.docker.result }}" != "success" ]; then ALL_PASSED="false"; fi
        if [ "${{ needs.docker-compose.result }}" != "success" ]; then ALL_PASSED="false"; fi
        
        if [ "$ALL_PASSED" == "true" ]; then
          echo "🎉 **All checks passed - Build is ready for deployment!** 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Deployment Ready Checklist" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code quality and formatting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Django system and security checks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests with coverage" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ API schema validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker container builds and runs" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container security scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Compose configuration" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Some checks failed - Build is not ready for deployment** ⛔" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please review the failed checks above and fix the issues before deploying." >> $GITHUB_STEP_SUMMARY
        fi
